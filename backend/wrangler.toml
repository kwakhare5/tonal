name = "tonal-proxy"
main = "src/index.js"
compatibility_date = "2024-05-08"

[vars]
ALLOWED_ORIGIN = "https://tonall.vercel.app"

# Security: CORS origin-only protection (no AUTH_TOKEN).
# Worker accepts requests ONLY from:
#   - chrome-extension:// origins
#   - http://localhost (dev)
#   - https://tonall.pages.dev
#
# Rate Limiting: Configure via Cloudflare Dashboard:
#   Security → WAF → Rate Limiting Rules
#   Path: /  |  Method: POST  |  Threshold: 30 req/min per IP  |  Action: Block 60s

[ai]
binding = "AI"

