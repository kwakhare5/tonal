name = "tonal-proxy"
main = "src/index.js"
compatibility_date = "2024-05-08"

[vars]
ALLOWED_ORIGIN = "https://tonall.vercel.app"

# AUTH_TOKEN must be set as a secret (not in vars):
#   wrangler secret put AUTH_TOKEN
# Then paste your token value (e.g. tonal_sk_<random>).
#
# Rate Limiting: Configure via Cloudflare Dashboard:
#   Settings → Security → WAF → Rate Limiting Rules
#   Path: /  |  Method: POST  |  Threshold: 30 req/min per IP  |  Action: Block 60s

[ai]
binding = "AI"

