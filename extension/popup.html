<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        /* Colour Tokens */
        --black: #0f0f0f;
        --gray-1: #1c1c1e;
        --gray-2: #2c2c2e;
        --gray-3: #3a3a3c;
        --gray-4: #636366;
        --gray-5: #aeaeb2;
        --gray-6: #d1d1d6;
        --gray-7: #e5e5ea;
        --gray-8: #f2f2f7;
        --gray-9: #f5f5f7;
        --white: #ffffff;
        --green: #34c759;
        --red: #ff3b30;
        --orange: #ff9f0a;

        /* Unified Font Stack (Design System + Project) */
        --font: "DM Sans", sans-serif;

        /* Radius Tokens */
        --r-sm: 6px;
        --r-md: 10px;
        --r-lg: 14px;
        --r-xl: 20px;

        /* Shadow Tokens */
        --sh-xs: 0 1px 2px rgba(0, 0, 0, 0.06);
        --sh-sm: 0 1px 4px rgba(0, 0, 0, 0.06), 0 4px 12px rgba(0, 0, 0, 0.06);
        --sh-md: 0 2px 8px rgba(0, 0, 0, 0.06), 0 12px 32px rgba(0, 0, 0, 0.08);
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: inherit;
      }

      html {
        width: 280px;
        background: var(--white);
      }

      body {
        width: 280px;
        background: var(--white);
        font-family: var(--font);
        -webkit-font-smoothing: antialiased;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }

      /* ── POPUP HEAD ────────────────────────────────────────────── */
      .popup-head {
        padding: 14px 16px 10px;
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .popup-logo {
        width: 28px;
        height: 28px;
        background: var(--black);
        border-radius: 7px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .popup-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--black);
        letter-spacing: -0.02em;
        line-height: 1.2;
      }

      .popup-sub {
        font-size: 10px;
        color: var(--gray-4);
      }

      /* ── TABS ──────────────────────────────────────────────────── */
      .tabs {
        display: flex;
        background: var(--gray-8);
        padding: 2px;
        gap: 2px;
        margin: 0 16px 8px;
        border-radius: var(--r-sm);
      }

      .tab-btn {
        flex: 1;
        padding: 6px 0;
        font-size: 11px;
        font-weight: 600;
        text-align: center;
        cursor: pointer;
        border: none;
        background: transparent;
        color: var(--gray-4);
        font-family: var(--font);
        border-radius: 5px;
        transition: all 0.15s ease;
      }

      .tab-btn--active {
        background: var(--white);
        color: var(--black);
        box-shadow: var(--sh-xs);
      }

      /* ── POPUP BODY (VIEWS WRAPPER) ────────────────────────────── */
      .popup-body {
        width: 280px;
        overflow: hidden;
      }

      .views-wrapper {
        display: flex;
        width: 560px;
        transition: transform 0.25s cubic-bezier(0.2, 0, 0, 1);
      }

      .view-panel {
        width: 280px;
        flex-shrink: 0;
        padding: 8px 16px 14px;
        display: flex;
        flex-direction: column;
      }

      /* ── SETTINGS VIEW ─────────────────────────────────────────── */
      .toggle-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .toggle-info {
        display: flex;
        flex-direction: column;
        gap: 1px;
      }

      .toggle-title {
        font-size: 11px;
        font-weight: 600;
        color: var(--black);
      }

      .toggle-sub {
        font-size: 9px;
        color: var(--gray-4);
      }

      /* iOS Toggle Switch */
      .switch {
        position: relative;
        display: inline-block;
        width: 32px;
        height: 18px;
        flex-shrink: 0;
      }

      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }

      .slider {
        position: absolute;
        cursor: pointer;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: var(--gray-7);
        transition: 0.2s ease;
        border-radius: 9px;
      }

      .slider:before {
        position: absolute;
        content: "";
        height: 14px;
        width: 14px;
        left: 2px;
        bottom: 2px;
        background-color: var(--white);
        transition: 0.2s ease;
        border-radius: 50%;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.15);
      }

      input:checked + .slider {
        background-color: var(--green);
      }

      input:checked + .slider:before {
        transform: translateX(14px);
      }

      .popup-field-label {
        font-size: 9px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--gray-5);
        margin-bottom: 6px;
        margin-top: 4px;
      }

      .segmented {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr;
        background: var(--gray-8);
        border-radius: var(--r-md);
        padding: 3px;
        gap: 2px;
        margin-bottom: 14px;
      }

      .seg-item {
        padding: 7px 4px;
        text-align: center;
        font-size: 11px;
        font-weight: 500;
        color: var(--gray-4);
        border-radius: var(--r-sm);
        cursor: pointer;
        font-family: var(--font);
        transition: all 0.15s ease;
      }

      .seg-item--active {
        background: var(--white);
        color: var(--black);
        font-weight: 600;
        box-shadow: var(--sh-xs);
      }

      .popup-save {
        width: 100%;
        background: var(--black);
        color: var(--white);
        border: none;
        border-radius: var(--r-md);
        padding: 9px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: var(--font);
        letter-spacing: -0.01em;
        transition: all 0.15s ease;
      }

      .popup-save:active {
        transform: scale(0.98);
      }

      /* ── ACTIVITY VIEW ─────────────────────────────────────────── */
      .stats-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 8px;
        margin-bottom: 8px;
      }

      .stats-card {
        background: var(--gray-9);
        border: 1px solid var(--gray-8);
        border-radius: var(--r-md);
        padding: 10px 12px;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }

      .stats-card--full {
        grid-column: span 2;
      }

      .stats-val {
        font-size: 18px;
        font-weight: 700;
        color: var(--black);
      }

      .stats-label {
        font-size: 9px;
        font-weight: 600;
        color: var(--gray-4);
        text-transform: uppercase;
        letter-spacing: 0.03em;
      }

      /* ── POPUP FOOTER ──────────────────────────────────────────── */
      .popup-footer {
        padding: 10px 16px 12px;
        border-top: 1px solid var(--gray-8);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .popup-platforms {
        display: flex;
        gap: 4px;
      }

      .platform-tag {
        background: var(--gray-8);
        border-radius: 4px;
        padding: 2px 6px;
        font-size: 9px;
        font-weight: 500;
        color: var(--gray-4);
      }

      .popup-status {
        font-size: 9px;
        font-weight: 700;
        color: var(--green);
        text-transform: uppercase;
        letter-spacing: 0.05em;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .popup-status:before {
        content: "";
        width: 5px;
        height: 5px;
        background: currentColor;
        border-radius: 50%;
      }
    </style>
  </head>
  <body>
    <div class="popup-head">
      <div class="popup-logo">
        <img
          src="icons/icon128.png"
          alt="Tonal Logo"
          style="width: 16px; height: 16px; border-radius: inherit; display: block;"
        />
      </div>
      <div>
        <div class="popup-title">Tonal</div>
        <div class="popup-sub">Two-way tone translator</div>
      </div>
    </div>

    <!-- Tab Selector -->
    <div class="tabs">
      <button class="tab-btn tab-btn--active" id="tab-settings">Settings</button>
      <button class="tab-btn" id="tab-activity">Activity</button>
    </div>

    <!-- Sliding View Panel -->
    <div class="popup-body">
      <div class="views-wrapper" id="viewsWrapper">
        <!-- Panel 1: Settings -->
        <div class="view-panel" id="settingsPanel">
          <!-- Toggle 1: Pill Helper -->
          <div class="toggle-item">
            <div class="toggle-info">
              <span class="toggle-title">Tone Pill Helper</span>
              <span class="toggle-sub">Show float helper in fields</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="toggle-pill" checked />
              <span class="slider"></span>
            </label>
          </div>

          <!-- Toggle 2: Decode Helper -->
          <div class="toggle-item">
            <div class="toggle-info">
              <span class="toggle-title">Highlight to Decode</span>
              <span class="toggle-sub">Explain selection jargon</span>
            </div>
            <label class="switch">
              <input type="checkbox" id="toggle-decode" checked />
              <span class="slider"></span>
            </label>
          </div>

          <div class="popup-field-label">Default tone</div>
          <div class="segmented" id="toneSelector">
            <div class="seg-item" data-tone="casual">Casual</div>
            <div class="seg-item" data-tone="workChat">Work</div>
            <div class="seg-item" data-tone="formal">Formal</div>
          </div>
          <button class="popup-save" id="saveBtn">Save preference</button>
        </div>

        <!-- Panel 2: Activity Stats -->
        <div class="view-panel" id="activityPanel">
          <div class="stats-grid">
            <div class="stats-card">
              <span class="stats-val" id="stat-rewrites">142</span>
              <span class="stats-label">Rewrites</span>
            </div>
            <div class="stats-card">
              <span class="stats-val" id="stat-decoded">1,085</span>
              <span class="stats-label">Words Decoded</span>
            </div>
            <div class="stats-card stats-card--full">
              <span class="stats-val" id="stat-time">24 mins</span>
              <span class="stats-label">Focus Time Saved</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="popup-footer">
      <div class="popup-platforms">
        <span class="platform-tag">Gmail</span>
        <span class="platform-tag">Slack</span>
        <span class="platform-tag">LinkedIn</span>
      </div>
      <span class="popup-status">Active</span>
    </div>
    <script src="popup.js"></script>
  </body>
</html>
